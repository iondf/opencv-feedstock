# Hadron-focused CUDA build matrix.
# Keep this small on purpose: the upstream conda-forge matrix is enormous, and
# we only need a linux-64 OpenCV that replaces libopencv for CUDA SLAM work.
target_platform:
  - linux-64

c_compiler:
  - gcc

cxx_compiler:
  - gxx

c_compiler_version:
  - 14

cxx_compiler_version:
  - 14

python:
  - 3.13

numpy:
  - 2

ffmpeg:
  - 8

qt_version:
  - 6

hdf5:
  - 2

libprotobuf:
  - 6.31.1

libopenvino_dev:
  - 2025.4.1

cuda_version:
  - 12.9

zip_keys:
  -
    - libprotobuf
    - libopenvino_dev
