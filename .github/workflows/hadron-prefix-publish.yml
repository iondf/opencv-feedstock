name: Hadron Prefix Publish

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/hadron-prefix-publish.yml"
      - ".ci_support/linux_64_hadron_cuda129python3.13qt_version6.yaml"
      - ".ci_support/win_64_hadron_cuda129python3.13qt_version6.yaml"
      - ".ci_support/osx_arm64_hadron_coremlpython3.13qt_version6.yaml"
      - "recipe/**"
  workflow_dispatch:
    inputs:
      channel:
        description: "prefix.dev channel"
        required: false
        default: "hadron"
        type: string
      build_num:
        description: "Conda build number override"
        required: false
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate recipe renders
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Setup micromamba
        uses: mamba-org/setup-micromamba@v2
        with:
          init-shell: bash
          environment-name: render
          create-args: conda-build

      - name: Render publish variants
        shell: bash -el {0}
        run: |
          set -euo pipefail
          for config in \
            linux_64_hadron_cuda129python3.13qt_version6 \
            win_64_hadron_cuda129python3.13qt_version6 \
            osx_arm64_hadron_coremlpython3.13qt_version6
          do
            echo "::group::Render ${config}"
            conda render recipe -m ".ci_support/${config}.yaml" --no-source
            echo "::endgroup::"
          done

  build-and-publish:
    name: opencv-${{ matrix.target_platform }}
    needs: validate
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 720
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            target_platform: linux-64
            config: linux_64_hadron_cuda129python3.13qt_version6
            kind: linux
          - runner: windows-latest
            target_platform: win-64
            config: win_64_hadron_cuda129python3.13qt_version6
            kind: windows
          - runner: macos-15
            target_platform: osx-arm64
            config: osx_arm64_hadron_coremlpython3.13qt_version6
            kind: osx
    env:
      CONFIG: ${{ matrix.config }}
      UPLOAD_PACKAGES: "False"
      IS_PR_BUILD: "True"
      CI: github_actions
      SKIP_OUTPUT_VALIDATION: "True"
      FEEDSTOCK_NAME: ${{ github.event.repository.name }}
      GIT_BRANCH: ${{ github.ref_name }}
      flow_run_id: github_${{ github.run_id }}
      remote_url: https://github.com/${{ github.repository }}
      sha: ${{ github.sha }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure short build paths
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ matrix.kind }}" = "windows" ]; then
            echo "CONDA_BLD_PATH=C:\\b" >> "${GITHUB_ENV}"
            echo "MINIFORGE_HOME=C:\\mf" >> "${GITHUB_ENV}"
            echo "EXTRA_CB_OPTIONS=--no-long-test-prefix --prefix-length 80" >> "${GITHUB_ENV}"
            echo "CONDA_ARTIFACT_GLOB=C:\\b\\${{ matrix.target_platform }}\\*" >> "${GITHUB_ENV}"
          else
            echo "CONDA_BLD_PATH=/tmp/cb" >> "${GITHUB_ENV}"
            echo "CONDA_ARTIFACT_GLOB=/tmp/cb/${{ matrix.target_platform }}/*" >> "${GITHUB_ENV}"
          fi

      - name: Resolve prefix channel
        id: channel
        shell: bash
        env:
          INPUT_CHANNEL: ${{ github.event.inputs.channel }}
          VAR_CHANNEL: ${{ vars.PREFIX_CHANNEL }}
        run: |
          set -euo pipefail
          channel="${INPUT_CHANNEL}"
          if [ -z "${channel}" ]; then
            channel="${VAR_CHANNEL}"
          fi
          if [ -z "${channel}" ]; then
            channel="hadron"
          fi
          echo "channel=${channel}" >> "${GITHUB_OUTPUT}"
          echo "Publishing to prefix.dev/${channel}"

      - name: Override recipe build number
        if: ${{ github.event.inputs.build_num != '' }}
        shell: bash
        env:
          INPUT_BUILD_NUM: ${{ github.event.inputs.build_num }}
        run: |
          set -euo pipefail
          if ! [[ "${INPUT_BUILD_NUM}" =~ ^[0-9]+$ ]]; then
            echo "build_num must be an integer (0, 1, 2, ...)."
            exit 1
          fi
          awk -v n="${INPUT_BUILD_NUM}" '
            BEGIN { done=0 }
            /^[[:space:]]*\{% set build = [0-9]+ %\}[[:space:]]*$/ && done==0 {
              sub(/[0-9]+/, n)
              done=1
            }
            { print }
            END {
              if (done==0) {
                print "Could not find {% set build = N %} in recipe/meta.yaml" > "/dev/stderr"
                exit 2
              }
            }
          ' recipe/meta.yaml > recipe/meta.yaml.tmp
          mv recipe/meta.yaml.tmp recipe/meta.yaml
          grep -n "set build" recipe/meta.yaml

      - name: Build conda package
        if: matrix.kind == 'linux'
        shell: bash
        run: |
          set -euo pipefail
          retry_build() {
            local attempt=1
            local max_attempts=3
            until .scripts/run_docker_build.sh; do
              if [ "${attempt}" -ge "${max_attempts}" ]; then
                return 1
              fi
              echo "Build attempt ${attempt} failed; retrying after a short backoff."
              attempt=$((attempt + 1))
              sleep 90
            done
          }
          retry_build

      - name: Build conda package
        if: matrix.kind == 'osx'
        shell: bash
        run: |
          set -euo pipefail
          retry_build() {
            local attempt=1
            local max_attempts=3
            until .scripts/run_osx_build.sh; do
              if [ "${attempt}" -ge "${max_attempts}" ]; then
                return 1
              fi
              echo "Build attempt ${attempt} failed; retrying after a short backoff."
              attempt=$((attempt + 1))
              sleep 90
            done
          }
          retry_build

      - name: Build conda package
        if: matrix.kind == 'windows'
        shell: cmd
        run: |
          setlocal EnableDelayedExpansion
          set ATTEMPT=1
          :retry
          call .scripts\run_win_build.bat
          if !ERRORLEVEL! EQU 0 exit /b 0
          if !ATTEMPT! GEQ 3 exit /b !ERRORLEVEL!
          echo Build attempt !ATTEMPT! failed; retrying after a short backoff.
          set /A ATTEMPT+=1
          powershell -NoProfile -Command "Start-Sleep -Seconds 90"
          goto retry

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: conda-${{ matrix.target_platform }}
          path: ${{ env.CONDA_ARTIFACT_GLOB }}

      - name: Setup micromamba
        uses: mamba-org/setup-micromamba@v2
        with:
          init-shell: bash
          environment-name: publish
          create-args: rattler-build

      - name: Upload package to prefix.dev
        shell: bash -el {0}
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(/tmp/cb/${{ matrix.target_platform }}/*.conda /tmp/cb/${{ matrix.target_platform }}/*.tar.bz2 /c/b/${{ matrix.target_platform }}/*.conda /c/b/${{ matrix.target_platform }}/*.tar.bz2)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No packages found for ${{ matrix.target_platform }}"
            exit 1
          fi
          for pkg in "${files[@]}"; do
            echo "Uploading ${pkg}"
            rattler-build upload prefix --skip-existing -c "${{ steps.channel.outputs.channel }}" "${pkg}"
          done
